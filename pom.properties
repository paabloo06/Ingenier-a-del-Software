package cajeroautomatico;

public interface GestorPlanPensiones {

    boolean tieneCantidadInicial(double cantidad);
    boolean aportacionesPeriodicas(int cantidad);
    boolean edad(int edad);
    boolean abrirPlan(double cantidadInicial, int cantidadAportacionPeriodica, int edadSolicitante);

    public static class Implementacion implements GestorPlanPensiones {

        @Override
        public boolean tieneCantidadInicial(double cantidad) {
            return cantidad >= 1000;
        }

        @Override
        public boolean aportacionesPeriodicas(int cantidad) {
            return cantidad % 100 == 0;
        }

        @Override
        public boolean edad(int edad) {
            return edad >= 30;
        }

        @Override
        public boolean abrirPlan(double cantidadInicial, int cantidadAportacionPeriodica, int edadSolicitante) {
            return tieneCantidadInicial(cantidadInicial) &&
                   (cantidadAportacionPeriodica == 0 || aportacionesPeriodicas(cantidadAportacionPeriodica)) &&
                   edad(edadSolicitante);
        }
    }
}

